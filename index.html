<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Birthday Storm for Duodua 🎉</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('duodua.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;
      text-align: center;
      padding: 50px;
      overflow: hidden;
      position: relative;
    }.card {
  background: rgba(0,0,0,0.4);
  padding: 30px;
  border-radius: 20px;
  max-width: 500px;
  margin: auto;
  box-shadow: 0 10px 50px rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 12px;
  background: white;
  color: #ff4e78;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  margin-top: 10px;
}

button:hover {
  transform: scale(1.15) rotate(-3deg);
  background: #ffebee;
}

.hidden {
  display: none;
  margin-top: 20px;
  font-size: 18px;
  line-height: 1.6;
}

.typing {
  border-right: 3px solid white;
  white-space: nowrap;
  overflow: hidden;
  display: inline-block;
  animation: blink 0.7s infinite;
}

@keyframes blink {
  50% { border-color: transparent; }
}

.heart, .star, .spark, .popup, .love, .nameRibbon, .firework, .emojiRain, .loveExplosion {
  position: absolute;
  cursor: pointer;
}

.heart, .love, .loveExplosion {
  color: rgba(255,0,100,0.8);
  font-size: 24px;
  animation: float 6s linear infinite;
}

.star, .spark {
  color: rgba(255,255,255,0.7);
}

@keyframes float {
  from { transform: translateY(100vh) rotate(0deg); opacity: 1; }
  to { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}

.confetti {
  position: absolute;
  width: 8px;
  height: 8px;
  background: white;
  animation: confettiFall 4s linear infinite;
}

@keyframes confettiFall {
  from { transform: translateY(-10vh) rotate(0deg); }
  to { transform: translateY(100vh) rotate(360deg); }
}

.nameRibbon {
  font-size: 50px;
  font-weight: bold;
  color: #ff77aa;
  text-shadow: 0 0 10px #ff77aa, 0 0 20px #ff44ff, 0 0 30px #ff00ff;
  animation: ribbonFloat 8s infinite alternate;
}

@keyframes ribbonFloat {
  0% { transform: translateX(-100%) translateY(10vh) rotate(-10deg); opacity: 0; }
  50% { transform: translateX(50vw) translateY(20vh) rotate(10deg); opacity: 1; }
  100% { transform: translateX(100%) translateY(10vh) rotate(-10deg); opacity: 0; }
}

.firework {
  font-size: 30px;
  color: #ffff66;
  animation: fireworkExplode 1s ease-out forwards;
}

@keyframes fireworkExplode {
  0% { transform: scale(0); opacity: 1; }
  100% { transform: scale(2); opacity: 0; }
}

.emojiRain {
  font-size: 24px;
  animation: emojiFall 5s linear forwards;
}

@keyframes emojiFall {
  0% { transform: translateY(-10vh); }
  100% { transform: translateY(100vh); }
}

  </style>
</head>
<body>  <div class="card">
    <h1>🎂 Decode Your Birthday Storm</h1>
    <p id="code">5-21-7-5-14-9-1</p><button onclick="reveal()">Decode 🎁</button>

<div id="message" class="hidden">
  <h2>Duodua 🎉❤️</h2>
  <p id="typedText" class="typing"></p>

  <button onclick="extraSurprise()">Tap for Extra Fun 👀</button>
  <button onclick="loveExplosion()">💥 Secret Love Explosion 💥</button>
  <p id="extra" class="hidden">🎊 Surprise storm unleashed! You’re the star today! ✨💥 Don’t forget to dance, laugh, and sparkle! 🥳</p>
</div>

  </div>  <audio id="music" loop autoplay>
    <source src="song1.mp3.mp3" type="audio/mpeg">
  </audio>  <script>
    const music = document.getElementById('music');
    music.volume = 0.7;
    music.play().catch(() => console.log('Autoplay blocked'));

    const text = "Hey Duodua 🎉\n\nThe world is about to get fun, and your birthday is leading the storm! 😎\n\nFeel the vibes, enjoy the confetti, and let the stars shine for you tonight! 🌟\n\nCelebrate like there’s no tomorrow! 🥳✨\n\nP.S. Wishing you this amazing day from me, Jude 😏❤️";

    let i = 0;
    function typeEffect() {
      if (i < text.length) {
        document.getElementById("typedText").innerHTML += text.charAt(i) === "\n" ? "<br>" : text.charAt(i);
        i++;
        setTimeout(typeEffect, 25);
      }
    }

    function reveal() {
      document.getElementById("message").style.display = "block";
      music.play().catch(() => console.log('Click to play music'));
      typeEffect();
      launchConfetti();
      launchStars();
      launchSparks();
    }

    function extraSurprise() {
      document.getElementById("extra").style.display = "block";
      launchHugeLove();
      launchNameRibbon();
      launchFireworks();
      launchEmojiRain();
    }

    function loveExplosion() {
      for (let i = 0; i < 150; i++) {
        const love = document.createElement('div');
        love.classList.add('loveExplosion');
        love.innerHTML = '💖';
        love.style.left = Math.random() * 100 + 'vw';
        love.style.top = Math.random() * 100 + 'vh';
        love.style.fontSize = (Math.random() * 50 + 20) + 'px';
        document.body.appendChild(love);
        setTimeout(() => love.remove(), 8000);
      }
    }

    function launchHugeLove() {
      for (let i = 0; i < 100; i++) {
        const love = document.createElement('div');
        love.classList.add('love');
        love.innerHTML = '💖';
        love.style.left = Math.random() * 100 + 'vw';
        love.style.top = Math.random() * 100 + 'vh';
        love.style.fontSize = (Math.random() * 40 + 20) + 'px';
        document.body.appendChild(love);
        setTimeout(() => love.remove(), 8000);
      }
    }

    function launchNameRibbon() {
      const ribbon = document.createElement('div');
      ribbon.classList.add('nameRibbon');
      ribbon.innerHTML = 'Duodua 💖';
      document.body.appendChild(ribbon);
      setTimeout(() => ribbon.remove(), 12000);
    }

    function launchFireworks() {
      for (let i = 0; i < 30; i++) {
        const firework = document.createElement('div');
        firework.classList.add('firework');
        firework.innerHTML = '✨';
        firework.style.left = Math.random() * 100 + 'vw';
        firework.style.top = Math.random() * 50 + 'vh';
        document.body.appendChild(firework);
        setTimeout(() => firework.remove(), 1000);
      }
    }

    function launchEmojiRain() {
      const emojis = ['🎂','🎉','🌟','🥳','💖'];
      for (let i = 0; i < 50; i++) {
        const emoji = document.createElement('div');
        emoji.classList.add('emojiRain');
        emoji.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
        emoji.style.left = Math.random() * 100 + 'vw';
        document.body.appendChild(emoji);
        setTimeout(() => emoji.remove(), 5000);
      }
    }

    function createPopup(message) {
      const popup = document.createElement('div');
      popup.classList.add('popup');
      popup.innerHTML = message;
      popup.style.left = Math.random() * 80 + 'vw';
      popup.style.top = Math.random() * 80 + 'vh';
      popup.style.fontSize = '20px';
      document.body.appendChild(popup);
      setTimeout(() => popup.remove(), 2000);
    }

    setInterval(() => {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (Math.random() * 20 + 10) + "px";
      document.body.appendChild(heart);
      heart.addEventListener('click', () => createPopup('You clicked a heart! 💖'));
      setTimeout(() => heart.remove(), 6000);
    }, 200);

    function launchStars() {
      for (let i = 0; i < 50; i++) {
        const star = document.createElement("div");
        star.classList.add("star");
        star.innerHTML = "⭐";
        star.style.left = Math.random() * 100 + "vw";
        star.style.fontSize = (Math.random() * 15 + 5) + "px";
        star.style.animationDuration = (Math.random() * 4 + 3) + "s";
        document.body.appendChild(star);
        star.addEventListener('click', () => createPopup('You touched a star! 🌟'));
        setTimeout(() => star.remove(), 7000);
      }
    }

    function launchSparks() {
      for (let i = 0; i < 40; i++) {
        const spark = document.createElement("div");
        spark.classList.add("spark");
        spark.innerHTML = "✨";
        spark.style.left = Math.random() * 100 + "vw";
        spark.style.fontSize = (Math.random() * 15 + 8) + "px";
        spark.style.animationDuration = (Math.random() * 4 + 2) + "s";
        document.body.appendChild(spark);
        spark.addEventListener('click', () => createPopup('Spark magic! ✨'));
        setTimeout(() => spark.remove(), 7000);
      }
    }
  </script></body>
</html>
